<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenXFlow 启动失败</title>
    <style>
      :root { color-scheme: dark; font-family: Inter, system-ui, sans-serif; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #0f172a; color: #e2e8f0; }
      main { width: min(680px, calc(100vw - 64px)); }
      .card { padding: 32px; border: 1px solid #334155; border-radius: 16px; background: #111827; box-shadow: 0 24px 60px rgb(0 0 0 / 0.35); }
      h1 { margin-top: 0; color: #fca5a5; }
      p { color: #cbd5e1; line-height: 1.7; }
      code { display: block; max-height: 220px; overflow: auto; padding: 16px; border-radius: 10px; background: #020617; color: #fecaca; white-space: pre-wrap; word-break: break-word; }
      button { margin-top: 20px; padding: 10px 16px; border: 0; border-radius: 8px; background: #0ea5e9; color: white; cursor: pointer; }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>OpenXFlow 本地运行时启动失败</h1>
      <p>请打开日志目录查看完整信息。修复运行时或依赖问题后，可重新启动应用。</p>
      <code id="message">未知错误</code>
      <button id="logs" type="button">打开日志目录</button>
    </main>
    <script>
      const params = new URLSearchParams(location.search);
      document.getElementById("message").textContent = params.get("message") || "未知错误";
      document.getElementById("logs").addEventListener("click", () => window.openxflowDesktop?.openLogsDirectory());
    </script>
  </body>
</html>
