name: Fix Claude SVG props

on:
  push:
    branches:
      - agent/nebula-theme-preset

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: agent/nebula-theme-preset
      - name: Fix invalid JSX SVG attributes
        run: |
          python - <<'PY'
          from pathlib import Path

          replacements = {
              "fill-rule": "fillRule",
              "clip-rule": "clipRule",
              "clip-path": "clipPath",
              "stroke-width": "strokeWidth",
              "stroke-linecap": "strokeLinecap",
              "stroke-linejoin": "strokeLinejoin",
              "stop-color": "stopColor",
              "flood-color": "floodColor",
              "color-interpolation-filters": "colorInterpolationFilters",
          }

          matches = list(Path("src/frontend/src").rglob("Claude.jsx"))
          if not matches:
              raise SystemExit("Claude.jsx was not found")

          changed = []
          for path in matches:
              content = path.read_text(encoding="utf-8")
              updated = content
              for old, new in replacements.items():
                  updated = updated.replace(old, new)
              if updated != content:
                  path.write_text(updated, encoding="utf-8")
                  changed.append(str(path))

          if not changed:
              raise SystemExit("No invalid SVG attributes were found")

          print("Updated:")
          print("\n".join(changed))
          PY
      - name: Format changed file
        working-directory: src/frontend
        run: npx @biomejs/biome format --write src
      - name: Commit fix
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/frontend/src
          git commit -m "fix(frontend): use React SVG attribute names"
          git push origin HEAD:agent/nebula-theme-preset
