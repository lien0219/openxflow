name: Channel Gateway Final Formatter

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/channel-gateway-final-formatter.yml"

permissions:
  contents: write

jobs:
  format:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: src/frontend
        run: npm ci --ignore-scripts --loglevel=error

      - name: Format Channel Center sources
        working-directory: src/frontend
        run: >-
          npx --no-install biome check --write --unsafe
          src/controllers/API/queries/channels
          src/locales/channelTranslations.ts
          src/pages/SettingsPage/pages/ChannelsPage

      - name: Remove one-time workflow and commit
        shell: bash
        run: |
          set -euo pipefail
          git rm .github/workflows/channel-gateway-final-formatter.yml
          if git diff --cached --quiet && git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/frontend/src/controllers/API/queries/channels \
            src/frontend/src/locales/channelTranslations.ts \
            src/frontend/src/pages/SettingsPage/pages/ChannelsPage
          git commit -m "style(channels): format final channel center sources"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
