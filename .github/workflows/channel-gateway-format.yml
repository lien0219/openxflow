name: Channel Gateway Format

on:
  push:
    branches:
      - feature/channel-gateway
    paths:
      - ".github/workflows/channel-gateway-format.yml"
      - "src/frontend/src/controllers/API/queries/channels/**"
      - "src/frontend/src/controllers/API/helpers/constants.ts"
      - "src/frontend/src/pages/SettingsPage/pages/ChannelsPage/**"
      - "src/frontend/src/pages/SettingsPage/index.tsx"
      - "src/frontend/src/routes.tsx"

permissions:
  contents: write

concurrency:
  group: channel-gateway-format-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: src/frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: feature/channel-gateway

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --ignore-scripts

      - name: Format Channel Center files
        run: >-
          npx --no-install biome format --write
          src/controllers/API/queries/channels
          src/pages/SettingsPage/pages/ChannelsPage
          src/controllers/API/helpers/constants.ts
          src/pages/SettingsPage/index.tsx
          src/routes.tsx

      - name: Commit formatted files
        working-directory: .
        run: |
          if git diff --quiet; then
            echo "No formatting changes required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/frontend/src/controllers/API/queries/channels \
            src/frontend/src/controllers/API/helpers/constants.ts \
            src/frontend/src/pages/SettingsPage/pages/ChannelsPage \
            src/frontend/src/pages/SettingsPage/index.tsx \
            src/frontend/src/routes.tsx
          git commit -m "style(channels): format channel center"
          git push origin HEAD:feature/channel-gateway
