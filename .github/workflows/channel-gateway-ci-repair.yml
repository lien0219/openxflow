name: Channel Gateway CI Repair

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/channel-gateway-ci-repair.yml"

permissions:
  contents: write

jobs:
  repair:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Support Python 3.10 channel command scopes
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path("src/backend/base/langflow/services/database/models/channel/command_model.py")
          text = path.read_text(encoding="utf-8")
          text = text.replace("from enum import StrEnum", "from enum import Enum")
          text = text.replace("class ChannelCommandScope(StrEnum):", "class ChannelCommandScope(str, Enum):")
          path.write_text(text, encoding="utf-8")
          PY

      - name: Align authentication branding tests
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          texts = Path("src/frontend/tests/utils/constants/texts.ts")
          content = texts.read_text(encoding="utf-8").replace(
              'authSignInHeader: "sign in to langflow"',
              'authSignInHeader: "Sign in to OpenXFlow"',
          )
          texts.write_text(content, encoding="utf-8")

          auto_login = Path("src/frontend/tests/core/features/auto-login-off.spec.ts")
          content = auto_login.read_text(encoding="utf-8").replace(
              '"Welcome to LangFlow"',
              '"Welcome to OpenXFlow"',
          )
          auto_login.write_text(content, encoding="utf-8")
          PY

      - name: Align MCP documentation test
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path("src/frontend/tests/extended/features/mcp-server-tab.spec.ts")
          content = path.read_text(encoding="utf-8").replace(
              '"https://docs.langflow.org/mcp-server#connect-clients-to-use-the-servers-actions"',
              '"https://github.com/lien0219/openxflow#readme"',
          )
          path.write_text(content, encoding="utf-8")
          PY

      - name: Align API key settings test
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path("src/frontend/tests/extended/features/userSettings.spec.ts")
          content = path.read_text(encoding="utf-8")
          content = content.replace(
              'await page.getByText("Langflow API").first().click();',
              'await page.getByRole("link", { name: "OpenXFlow API Keys" }).click();',
          )
          content = content.replace(
              'page.getByText("Langflow API Keys", { exact: true }).nth(1)',
              'page.getByText("OpenXFlow API Keys", { exact: true }).nth(1)',
          )
          path.write_text(content, encoding="utf-8")
          PY

      - name: Refresh clean LFX starter fixture
        shell: bash
        run: |
          cp \
            "src/backend/base/langflow/initial_setup/starter_projects/Basic Prompting.json" \
            "src/lfx/tests/fixtures/starter_flows/v1.9.0/basic_prompting.json"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: src/frontend
        run: npm ci --ignore-scripts --loglevel=error

      - name: Format and verify affected frontend tests
        working-directory: src/frontend
        run: |
          npx --no-install biome check --write --unsafe \
            tests/utils/constants/texts.ts \
            tests/core/features/auto-login-off.spec.ts \
            tests/extended/features/mcp-server-tab.spec.ts \
            tests/extended/features/userSettings.spec.ts
          npx --no-install biome check \
            tests/utils/constants/texts.ts \
            tests/core/features/auto-login-off.spec.ts \
            tests/extended/features/mcp-server-tab.spec.ts \
            tests/extended/features/userSettings.spec.ts

      - name: Verify Python 3.10 syntax
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Compile compatibility model
        run: >-
          python -m py_compile
          src/backend/base/langflow/services/database/models/channel/command_model.py

      - name: Commit repairs to feature branch
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        shell: bash
        run: |
          set -euo pipefail
          git rm .github/workflows/channel-gateway-ci-repair.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/backend/base/langflow/services/database/models/channel/command_model.py \
            src/lfx/tests/fixtures/starter_flows/v1.9.0/basic_prompting.json \
            src/frontend/tests/utils/constants/texts.ts \
            src/frontend/tests/core/features/auto-login-off.spec.ts \
            src/frontend/tests/extended/features/mcp-server-tab.spec.ts \
            src/frontend/tests/extended/features/userSettings.spec.ts
          git commit -m "fix(ci): support Python 3.10 and OpenXFlow branded tests"
          git pull --rebase origin "${HEAD_REF}"
          git push origin "HEAD:${HEAD_REF}"
