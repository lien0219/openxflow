name: Channel Gateway I18n Apply

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/channel-gateway-i18n-apply.yml"

permissions:
  contents: write

concurrency:
  group: channel-gateway-i18n-apply-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Reconstruct localized sources
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from __future__ import annotations

          import base64
          import tarfile
          from pathlib import Path

          root = Path.cwd().resolve()
          chunks = sorted(Path(".github/channel-i18n-chunks").glob("chunk-*.txt"))
          if not chunks:
              raise SystemExit("No localization chunks were found")
          encoded = "".join("".join(path.read_text(encoding="utf-8").split()) for path in chunks)
          archive = Path("/tmp/channel-i18n.tar.gz")
          archive.write_bytes(base64.b64decode(encoded, validate=True))
          with tarfile.open(archive, "r:gz") as bundle:
              members = bundle.getmembers()
              for member in members:
                  target = (root / member.name).resolve()
                  if root not in target.parents and target != root:
                      raise SystemExit(f"Unsafe archive member: {member.name}")
              bundle.extractall(root, filter="data")
              print("Applied localized files:")
              for member in members:
                  print(member.name)

          conversations = Path(
              "src/frontend/src/pages/SettingsPage/pages/ChannelsPage/"
              "components/ConversationsTab.tsx"
          )
          text = conversations.read_text(encoding="utf-8")
          text = text.replace(
              'className="mt-1 inline-flex rounded-full bg-amber-100 px-2 py-0.5 '
              'text-[11px] text-amber-800 dark:bg-amber-950/40 dark:text-amber-300"',
              'className="mt-1 inline-flex rounded-full border border-border bg-muted '
              'px-2 py-0.5 text-[11px] text-muted-foreground"',
          )
          conversations.write_text(text, encoding="utf-8")
          PY

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: src/frontend
        run: npm ci --ignore-scripts --loglevel=error

      - name: Apply frontend formatting fixes
        working-directory: src/frontend
        shell: bash
        run: |
          set +e
          npx --no-install biome check --write --unsafe \
            src/pages/SettingsPage/pages/ChannelsPage \
            2>&1 | tee /tmp/channel-i18n-biome.log
          exit 0

      - name: Run Channel Center unit tests
        working-directory: src/frontend
        run: >-
          npm test --
          --runInBand
          src/pages/SettingsPage/pages/ChannelsPage/__tests__/utils.test.ts

      - name: Capture Channel Center type diagnostics
        working-directory: src/frontend
        shell: bash
        run: |
          set +e
          npx --no-install tsc --noEmit --pretty false --project tsconfig.channels.json \
            2>&1 | tee /tmp/channel-i18n-tsc.log
          exit 0

      - name: Upload localization diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: channel-i18n-final-diagnostics
          path: |
            /tmp/channel-i18n-biome.log
            /tmp/channel-i18n-tsc.log
          if-no-files-found: error
          retention-days: 3

      - name: Remove staging files and commit localized UI
        shell: bash
        run: |
          set -euo pipefail
          git rm -r \
            .github/channel-i18n-chunks \
            .github/workflows/channel-gateway-i18n-finalize.yml \
            .github/workflows/channel-gateway-i18n-apply.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat(channels): localize channel management experience"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
