name: Channel Gateway Format Fix

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/channel-gateway-format-fix.yml"

permissions:
  contents: write

jobs:
  fix:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Fix migration and model metadata
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          command_model = Path("src/backend/base/langflow/services/database/models/channel/command_model.py")
          text = command_model.read_text(encoding="utf-8")
          text = text.replace(
              '        sa.Index("ix_channel_workflow_command_flow_id", "flow_id"),\n',
              "",
          )
          command_model.write_text(text, encoding="utf-8")

          migration = Path(
              "src/backend/base/langflow/alembic/versions/"
              "b9f2d7e6c4a1_add_channel_routing_and_discovery.py"
          )
          text = migration.read_text(encoding="utf-8")
          marker = '    indexes = {\n'
          if '"ix_channel_conversation_binding_status": ["status"],' not in text:
              text = text.replace(
                  marker,
                  marker + '        "ix_channel_conversation_binding_status": ["status"],\n',
                  1,
              )
          downgrade_marker = '        for index_name in (\n'
          if '            "ix_channel_conversation_binding_status",\n' not in text:
              text = text.replace(
                  downgrade_marker,
                  downgrade_marker + '            "ix_channel_conversation_binding_status",\n',
                  1,
              )
          migration.write_text(text, encoding="utf-8")
          PY

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Fix Python import ordering
        run: >-
          uvx --quiet ruff check --fix
          --config src/backend/tests/unit/channels/ruff.toml
          src/backend/tests/unit/channels/test_command_routing.py

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: src/frontend
        run: npm ci --ignore-scripts --loglevel=error

      - name: Format Channel Center files
        working-directory: src/frontend
        run: >-
          npx --no-install biome check --write
          src/controllers/API/queries/channels
          src/pages/SettingsPage/pages/ChannelsPage

      - name: Remove one-time workflow and commit fixes
        shell: bash
        run: |
          set -euo pipefail
          git rm .github/workflows/channel-gateway-format-fix.yml
          if git diff --cached --quiet && git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/backend/base/langflow/alembic/versions/b9f2d7e6c4a1_add_channel_routing_and_discovery.py \
            src/backend/base/langflow/services/database/models/channel/command_model.py \
            src/backend/tests/unit/channels/test_command_routing.py \
            src/frontend/src/controllers/API/queries/channels \
            src/frontend/src/pages/SettingsPage/pages/ChannelsPage
          git commit -m "fix(channels): align migrations and format gateway changes"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
