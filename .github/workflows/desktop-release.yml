name: Desktop release

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: Publish artifacts to a GitHub release
        required: true
        default: false
        type: boolean
  push:
    tags:
      - "desktop-v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: windows-x64
            os: windows-latest
            builder_arch: --x64
          - label: macos-arm64
            os: macos-14
            builder_arch: --arm64
          - label: macos-x64
            os: macos-13
            builder_arch: --x64
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.28"
          enable-cache: true
      - name: Install desktop dependencies
        run: npm install --package-lock-only --ignore-scripts && npm ci
      - name: Build shared frontend
        run: npm run frontend:prepare
      - name: Build embedded Python runtime
        run: npm run runtime:build
      - name: Verify embedded runtime
        run: npm run runtime:verify
      - name: Run desktop quality gates
        run: npm run test:ci
      - name: Build installer
        run: npm run dist -- ${{ matrix.builder_arch }} --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
      - uses: actions/upload-artifact@v4
        with:
          name: openxflow-desktop-${{ matrix.label }}
          path: |
            desktop/release/*.exe
            desktop/release/*.dmg
            desktop/release/*.blockmap
            desktop/release/latest*.yml
            desktop/release/latest*.yaml
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish GitHub release
    needs: build
    if: startsWith(github.ref, 'refs/tags/desktop-v') || inputs.publish_release == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: artifacts/**/*
