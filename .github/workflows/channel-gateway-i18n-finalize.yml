name: Channel Gateway I18n Finalize

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/channel-gateway-i18n-finalize.yml"

permissions:
  contents: write

concurrency:
  group: channel-gateway-i18n-finalize-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Reconstruct and verify localized patch
        shell: bash
        run: |
          set -euo pipefail
          cat .github/channel-i18n-chunks/chunk-*.txt > /tmp/channel-i18n-all.b64
          base64 --decode /tmp/channel-i18n-all.b64 > /tmp/channel-i18n-all.tar.gz
          sha256sum /tmp/channel-i18n-all.tar.gz
          tar -tzf /tmp/channel-i18n-all.tar.gz
          tar -xzf /tmp/channel-i18n-all.tar.gz

      - name: Preserve latest repository autofixes
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          execution_logs = Path(
              "src/backend/base/langflow/channels/services/execution_logs.py"
          )
          text = execution_logs.read_text(encoding="utf-8")
          text = text.replace(
              "    execution.status = (\n"
              "        ChannelExecutionStatus.SUCCEEDED.value if succeeded else ChannelExecutionStatus.FAILED.value\n"
              "    )\n",
              "    execution.status = ChannelExecutionStatus.SUCCEEDED.value if succeeded else ChannelExecutionStatus.FAILED.value\n",
              1,
          )
          execution_logs.write_text(text, encoding="utf-8")

          routing_tests = Path(
              "src/backend/tests/unit/channels/test_conversation_routing.py"
          )
          text = routing_tests.read_text(encoding="utf-8")
          text = text.replace(
              "        _derive_conversation_status(_connection(default_flow=False), binding)\n"
              "        == ChannelConversationStatus.PENDING.value\n",
              "        _derive_conversation_status(_connection(default_flow=False), binding) == ChannelConversationStatus.PENDING.value\n",
              1,
          )
          text = text.replace(
              "        _derive_conversation_status(_connection(default_flow=True), ignored)\n"
              "        == ChannelConversationStatus.IGNORED.value\n",
              "        _derive_conversation_status(_connection(default_flow=True), ignored) == ChannelConversationStatus.IGNORED.value\n",
              1,
          )
          routing_tests.write_text(text, encoding="utf-8")

          autofix = Path(".github/workflows/py_autofix.yml")
          text = autofix.read_text(encoding="utf-8")
          marker = "permissions:\n  contents: write\n  pull-requests: read\n\njobs:\n"
          replacement = (
              "permissions:\n  contents: write\n  pull-requests: read\n\n"
              "# Same-repository pull requests commit generated fixes directly, avoiding an external autofix app dependency.\n"
              "jobs:\n"
          )
          if marker in text:
              text = text.replace(marker, replacement, 1)
          autofix.write_text(text, encoding="utf-8")
          PY

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: src/frontend
        run: npm ci --ignore-scripts --loglevel=error

      - name: Format localized Channel Center
        working-directory: src/frontend
        run: >-
          npx --no-install biome check --write --unsafe
          src/pages/SettingsPage/pages/ChannelsPage

      - name: Check localized Channel Center formatting
        working-directory: src/frontend
        run: >-
          npx --no-install biome check
          src/pages/SettingsPage/pages/ChannelsPage

      - name: Run Channel Center unit tests
        working-directory: src/frontend
        run: >-
          npm test --
          --runInBand
          src/pages/SettingsPage/pages/ChannelsPage/__tests__/utils.test.ts

      - name: Type-check Channel Center
        working-directory: src/frontend
        shell: bash
        run: |
          set +e
          npx --no-install tsc --noEmit --pretty false --project tsconfig.channels.json 2>&1 | tee /tmp/channel-i18n-tsc.log
          tsc_status=${PIPESTATUS[0]}
          set -e

          channel_error_pattern='^src/(controllers/API/queries/channels|pages/SettingsPage/pages/ChannelsPage).*error TS[0-9]+:'
          if grep -E "$channel_error_pattern" /tmp/channel-i18n-tsc.log; then
            echo "Channel Center type errors detected."
            exit 1
          fi

          if [ "$tsc_status" -ne 0 ]; then
            echo "::warning::TypeScript reported pre-existing errors in imported shared modules."
          fi

      - name: Remove staging files and commit localized UI
        shell: bash
        run: |
          set -euo pipefail
          git rm -r \
            .github/channel-i18n-chunks \
            .github/workflows/channel-gateway-i18n-finalize.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            .github/workflows/py_autofix.yml \
            src/backend/base/langflow/channels/services/execution_logs.py \
            src/backend/tests/unit/channels/test_conversation_routing.py \
            src/frontend/src/pages/SettingsPage/pages/ChannelsPage
          git commit -m "feat(channels): localize channel management experience"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
