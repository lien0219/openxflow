name: Channel Gateway Command Finalize

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/channel-gateway-command-finalize.yml"

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Apply command routing updates
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("src/backend/base/langflow/channels/services/dispatch.py")
          text = path.read_text(encoding="utf-8")
          text = text.replace(
              "from datetime import datetime, timezone\n",
              "from datetime import datetime, timezone\nfrom difflib import get_close_matches\n",
              1,
          )
          text = text.replace(
              "from langflow.channels.domain.models import (\n    ChannelEvent,\n",
              "from langflow.channels.domain.models import (\n    ChannelAction,\n    ChannelEvent,\n",
              1,
          )
          text = text.replace(
              '        if command in {"/bind", "/whoami"}:\n',
              '        if command == "/bind":\n',
              1,
          )
          legacy = '''        # Legacy commands remain callable during the migration window but are no longer advertised.\n        if command == "/knowledge":\n            return await self._knowledge_message(user, binding)\n        if command == "/use-kb":\n            return await self._bind_knowledge_base(event, user, binding, argument)\n        if command == "/files":\n            return await self._recent_files_message(event, user)\n'''
          if legacy not in text:
              raise SystemExit("legacy public command block not found")
          text = text.replace(legacy, "", 1)
          text = text.replace(
              '            return ChannelMessage(text=f"没有找到指令 {command}。发送 /commands 查看当前可用指令。")\n',
              '            return await self._unknown_command_message(user, binding, command)\n',
              1,
          )
          command_result = '''        return ChannelMessage(\n            title="当前可用指令",\n            text="\\n".join(lines),\n        )\n\n    def _resolve_default_flow_id'''
          command_replacement = '''        return ChannelMessage(\n            message_type=ChannelMessageType.CARD,\n            title="当前可用指令",\n            text="\\n".join(lines),\n            actions=[\n                ChannelAction(\n                    action_id=f"command:{item.normalized_command}",\n                    label=item.command,\n                    value=item.command,\n                )\n                for item in commands[:6]\n            ],\n        )\n\n    async def _unknown_command_message(\n        self,\n        user: User,\n        binding: ChannelConversationBinding | None,\n        command_name: str,\n    ) -> ChannelMessage:\n        commands = []\n        if binding is not None:\n            commands = await list_available_workflow_commands(\n                self.session,\n                connection_id=self.connection.id,\n                conversation_binding_id=binding.id,\n                user_id=user.id,\n            )\n        command_by_name = {\n            name: item\n            for item in commands\n            for name in (item.normalized_command, *item.aliases)\n        }\n        suggestions = get_close_matches(\n            command_name.lower(),\n            list(command_by_name),\n            n=3,\n            cutoff=0.45,\n        )\n        if not suggestions:\n            return ChannelMessage(\n                text=f"没有找到指令 {command_name}。发送 /commands 查看当前可用指令。"\n            )\n        unique_commands = []\n        seen_ids = set()\n        for suggestion in suggestions:\n            item = command_by_name[suggestion]\n            if item.id not in seen_ids:\n                seen_ids.add(item.id)\n                unique_commands.append(item)\n        suggested_text = "、".join(item.command for item in unique_commands)\n        return ChannelMessage(\n            message_type=ChannelMessageType.CARD,\n            title="没有找到该指令",\n            text=f"你是否想使用：{suggested_text}？\\n\\n发送 /commands 查看全部指令。",\n            actions=[\n                ChannelAction(\n                    action_id=f"suggested:{item.normalized_command}",\n                    label=item.command,\n                    value=item.command,\n                )\n                for item in unique_commands\n            ],\n        )\n\n    def _resolve_default_flow_id'''
          if command_result not in text:
              raise SystemExit("commands response block not found")
          text = text.replace(command_result, command_replacement, 1)
          help_result = '''        return ChannelMessage(\n            title="OpenXFlow 渠道助手",\n            text=(\n                f"{binding_line}"\n                "可用系统指令：\\n"\n                "/bind — 绑定或查看账号状态\\n"\n                "/commands — 查看当前可用的自定义指令\\n"\n                "/help — 查看帮助\\n\\n"\n                "普通消息会自动运行当前会话或渠道连接的默认工作流。"\n            ),\n        )\n'''
          help_replacement = '''        return ChannelMessage(\n            message_type=ChannelMessageType.CARD,\n            title="OpenXFlow 渠道助手",\n            text=(\n                f"{binding_line}"\n                "可用系统指令：\\n"\n                "/bind — 绑定或查看账号状态\\n"\n                "/commands — 查看当前可用的自定义指令\\n"\n                "/help — 查看帮助\\n\\n"\n                "普通消息会自动运行当前会话或渠道连接的默认工作流。"\n            ),\n            actions=[\n                ChannelAction(action_id="account", label="账号状态", value="/bind"),\n                ChannelAction(\n                    action_id="commands",\n                    label="可用指令",\n                    value="/commands",\n                    style="primary",\n                ),\n            ],\n        )\n'''
          if help_result not in text:
              raise SystemExit("help response block not found")
          path.write_text(text.replace(help_result, help_replacement, 1), encoding="utf-8")

          test_path = Path("src/backend/tests/unit/channels/test_dispatch.py")
          tests = test_path.read_text(encoding="utf-8")
          marker = '''        binding=None,\n    )\n\n    assert response is None'''
          replacement = '''        binding=None,\n        trigger_type="default",\n    )\n\n    assert response is None'''
          if marker not in tests:
              raise SystemExit("Feishu execution test marker not found")
          tests = tests.replace(marker, replacement, 1)
          marker = '''        binding=None,\n    )\n\n    assert response == ChannelMessage'''
          replacement = '''        binding=None,\n        trigger_type="default",\n    )\n\n    assert response == ChannelMessage'''
          if marker not in tests:
              raise SystemExit("Telegram execution test marker not found")
          tests = tests.replace(marker, replacement, 1)
          tests += '''\n\ndef test_help_message_exposes_interactive_actions() -> None:\n    message = ChannelDispatchService._help_message(bound=True)\n\n    assert message.message_type == ChannelMessageType.CARD\n    assert [action.value for action in message.actions] == ["/bind", "/commands"]\n'''
          test_path.write_text(tests, encoding="utf-8")
          PY

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Format and lint updated Python files
        shell: bash
        run: |
          uvx --quiet ruff format \
            src/backend/base/langflow/channels/services/dispatch.py \
            src/backend/tests/unit/channels/test_dispatch.py
          uvx --quiet ruff check --fix \
            --config src/backend/base/langflow/channels/ruff.toml \
            src/backend/base/langflow/channels/services/dispatch.py
          uvx --quiet ruff check --fix \
            --config src/backend/tests/unit/channels/ruff.toml \
            src/backend/tests/unit/channels/test_dispatch.py

      - name: Remove one-time workflow and commit
        shell: bash
        run: |
          set -euo pipefail
          git rm .github/workflows/channel-gateway-command-finalize.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/backend/base/langflow/channels/services/dispatch.py \
            src/backend/tests/unit/channels/test_dispatch.py
          git commit -m "feat(channels): finalize public commands and interactive help"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
