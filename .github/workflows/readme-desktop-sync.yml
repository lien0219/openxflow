name: One-time README desktop sync

on:
  push:
    branches:
      - feature/desktop-app

permissions:
  contents: write

jobs:
  sync:
    if: github.event.head_commit.message != 'docs: align bilingual desktop readmes [skip ci]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/desktop-app
          fetch-depth: 0
      - name: Update Chinese and English READMEs
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          zh_path = Path("README.md")
          zh = zh_path.read_text(encoding="utf-8")
          zh = zh.replace(
              "OpenXFlow 同时支持浏览器运行与 Windows、macOS 桌面端。桌面端复用现有 React 前端和 FastAPI 后端，不复制业务逻辑，Web 与桌面端功能修改保持同步。",
              "OpenXFlow 同时支持浏览器运行与 Windows、macOS 桌面端。",
          )
          zh = zh.replace(
              "桌面端复用 Web 前后端业务代码，不影响 `make run_cli` 等原有命令。安装包构建、平台环境和常见问题请查看[桌面端指南](./DESKTOP.md)。",
              "安装包构建、平台环境和常见问题请查看[桌面端指南](./DESKTOP.md)。",
          )
          zh_path.write_text(zh, encoding="utf-8")

          en_path = Path("README_EN.md")
          en = en_path.read_text(encoding="utf-8")
          en = en.replace(
              "![FastAPI](https://img.shields.io/badge/FastAPI-009688?style=flat-square&logo=fastapi&logoColor=white)\n",
              "![FastAPI](https://img.shields.io/badge/FastAPI-009688?style=flat-square&logo=fastapi&logoColor=white)\n![Electron](https://img.shields.io/badge/Desktop-Windows%20%7C%20macOS-47848F?style=flat-square&logo=electron&logoColor=white)\n",
          )
          en = en.replace(
              "[Quick Start](#-quick-start) · [Core Capabilities](#-core-capabilities)",
              "[Quick Start](#-quick-start) · [Desktop](#desktop-application) · [Core Capabilities](#-core-capabilities)",
          )
          en = en.replace(
              "It enables developers to connect large language models, agents, knowledge bases, data sources, APIs, MCP servers, and external tools into reusable and extensible workflows.\n",
              "It enables developers to connect large language models, agents, knowledge bases, data sources, APIs, MCP servers, and external tools into reusable and extensible workflows.\n\nOpenXFlow supports both browser-based use and desktop applications for Windows and macOS.\n",
          )
          en = en.replace(
              "| API services | Integrate workflows through REST APIs, webhooks, and MCP |\n| Open deployment | Run locally, build containers, deploy privately, and customize integrations |",
              "| API services | Integrate workflows through REST APIs, webhooks, and MCP |\n| Desktop application | Run on Windows x64, macOS Apple Silicon, and macOS Intel |\n| Open deployment | Run locally, use desktop builds, build containers, deploy privately, and customize integrations |",
          )
          en = en.replace(
              "then run the workflow in the interface or integrate it through an API, webhook, or MCP.",
              "then run the workflow in the web or desktop interface, or integrate it through an API, webhook, or MCP.",
          )
          en = en.replace(
              "        Web[React visual canvas]\n        Playground[Playground]",
              "        Web[React visual canvas]\n        Desktop[Electron desktop application]\n        Playground[Playground]",
          )
          en = en.replace(
              "    Web --> FastAPI\n    Playground --> FastAPI",
              "    Web --> FastAPI\n    Desktop --> FastAPI\n    Playground --> FastAPI",
          )
          en = en.replace(
              "- **Experience layer:** Visual canvas, Playground, and entry points for API and MCP clients.",
              "- **Experience layer:** Web visual canvas, Electron desktop application, Playground, and entry points for API and MCP clients.",
          )
          en = en.replace(
              "| Backend | Python 3.10–3.14, FastAPI, SQLModel / SQLAlchemy, Alembic |\n| Workflow |",
              "| Backend | Python 3.10–3.14, FastAPI, SQLModel / SQLAlchemy, Alembic |\n| Desktop | Electron, electron-builder, Windows NSIS, macOS DMG |\n| Workflow |",
          )
          en = en.replace(
              "| Deployment | Local source build, Docker / Podman, Docker Compose, Dev Containers |",
              "| Deployment | Local web builds, Windows/macOS desktop builds, Docker / Podman, Docker Compose, Dev Containers |",
          )
          en = en.replace(
              "- GNU Make\n\nWindows users should use WSL or the included Dev Container.",
              "- GNU Make for web source development\n\nWindows web development should use WSL or the included Dev Container; the Windows desktop application runs directly on Windows.",
          )
          en = en.replace(
              "```bash\nmake run_clic\n```\n\n### Development Mode",
              "```bash\nmake run_clic\n```\n\n### Desktop Application\n\nWindows x64, macOS Apple Silicon arm64, and macOS Intel x64 are supported.\n\nInstall the desktop workspace and perform the first-time setup:\n\n```bash\nnpm --prefix desktop install\nnpm --prefix desktop run dev:setup\n```\n\nFor subsequent starts:\n\n```bash\nnpm --prefix desktop run dev\n```\n\nSee the [desktop guide](./DESKTOP.md) for packaging, platform setup, testing, and troubleshooting.\n\n### Development Mode",
          )
          en = en.replace(
              "├── deploy/                  # Deployment and observability configuration\n├── docker/",
              "├── deploy/                  # Deployment and observability configuration\n├── desktop/                 # Electron desktop application, runtime, and packaging scripts\n├── docker/",
          )
          en = en.replace(
              "├── README.md                # Simplified Chinese product overview",
              "├── DESKTOP.md               # Windows and macOS desktop guide\n├── README.md                # Simplified Chinese product overview",
          )
          en = en.replace(
              "| [DEVELOPMENT.md](./DEVELOPMENT.md) | Local development, Dev Containers, and environment setup |",
              "| [DESKTOP.md](./DESKTOP.md) | Windows/macOS installation, startup, testing, and packaging |\n| [DEVELOPMENT.md](./DEVELOPMENT.md) | Local development, Dev Containers, and environment setup |",
          )
          en = en.replace(
              "We also thank LangChain, FastAPI, React, and the broader open-source community.",
              "We also thank LangChain, FastAPI, React, Electron, and the broader open-source community.",
          )
          en_path.write_text(en, encoding="utf-8")
          PY
      - name: Commit changes
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add README.md README_EN.md
          git diff --cached --quiet && exit 0
          git commit -m "docs: align bilingual desktop readmes [skip ci]"
          git push origin HEAD:feature/desktop-app
