name: Channel Gateway Focused Diagnostics

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/channel-gateway-focused-diagnostics.yml"

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      PYTHONPATH: src/backend/base
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Recreate pending quality patch
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import textwrap

          workflow = Path(".github/workflows/channel-gateway-quality-fix.yml")
          lines = workflow.read_text(encoding="utf-8").splitlines()
          step_index = next(i for i, line in enumerate(lines) if line.strip() == "- name: Apply backend and compatibility fixes")
          run_index = next(i for i in range(step_index + 1, len(lines)) if lines[i].strip() == "run: |")
          end_index = next(i for i in range(run_index + 1, len(lines)) if lines[i].startswith("      - name:"))
          Path("/tmp/apply.sh").write_text(textwrap.dedent("\n".join(lines[run_index + 1:end_index])) + "\n")
          PY
          bash /tmp/apply.sh
          python - <<'PY'
          from pathlib import Path
          path = Path("src/backend/tests/unit/channels/test_frontend_channel_mutation_contract.py")
          text = path.read_text()
          text = text.replace('content.count("await queryClient.invalidateQueries(") == 12', 'content.count("queryClient.invalidateQueries(") == 13')
          text = text.replace('block.index("await queryClient.invalidateQueries(")', 'block.index("queryClient.invalidateQueries(")')
          path.write_text(text)
          path = Path("src/backend/tests/unit/channels/test_dispatch.py")
          text = path.read_text()
          text = text.replace(
              "    service.connection = None\n",
              "    service.connection = SimpleNamespace(id=adapter.connection_id, channel_type=adapter.channel_type.value, default_knowledge_base_id=None)\n",
              1,
          )
          path.write_text(text)
          PY

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Sync environment
        run: uv sync --quiet --frozen --project src/backend/base --group dev

      - name: Run focused tests and capture output
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          uv run --frozen --project src/backend/base --group dev pytest -vv --tb=long \
            --confcutdir=src/backend/tests/unit/channels \
            src/backend/tests/unit/channels/test_dispatch.py \
            src/backend/tests/unit/channels/test_frontend_channel_mutation_contract.py \
            src/backend/tests/unit/channels/test_command_routing.py \
            src/backend/tests/unit/channels/test_conversation_routing.py \
            2>&1 | tee /tmp/channel-focused-tests.log

      - name: Upload focused diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: channel-focused-tests
          path: /tmp/channel-focused-tests.log
          if-no-files-found: error
          retention-days: 3
