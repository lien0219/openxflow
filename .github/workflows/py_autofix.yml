name: autofix.ci
on:
  pull_request:
    paths:
      - "**/*.py"
      - "src/lfx/src/lfx/components/**"
      - "scripts/build_component_index.py"
    types: [opened, synchronize, reopened, labeled]

env:
  PYTHON_VERSION: "3.13"

permissions:
  contents: write
  pull-requests: read

# Same-repository pull requests commit generated fixes directly, avoiding an external autofix app dependency.
jobs:
  lint:
    name: Run Ruff Check and Format
    if: github.event.action != 'labeled' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Setup Environment
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: ${{ env.PYTHON_VERSION }}
          prune-cache: false

      - name: Apply Ruff fixes
        run: |
          uv run ruff check --fix-only .
          uv run ruff format . --config pyproject.toml

      - name: Commit Python autofixes
        if: github.event.pull_request.head.repo.fork == false
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          if git diff --quiet; then
            echo "Python sources are already formatted."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "style: apply Python autofixes"
          git push origin "HEAD:${HEAD_REF}"

      - name: Validate fork formatting
        if: github.event.pull_request.head.repo.fork
        run: git diff --exit-code

  update-starter-projects:
    name: Update Starter Projects
    if: >-
      github.event.action != 'labeled'
      && github.actor != 'github-actions[bot]'
      && !github.event.pull_request.head.repo.fork
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Setup Environment
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: ${{ env.PYTHON_VERSION }}
          prune-cache: false

      - name: Install dependencies
        run: |
          uv sync
          uv pip install -e .

      - name: Run starter projects update
        run: uv run python scripts/ci/update_starter_projects.py

      - name: Commit refreshed starter projects
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          if git diff --quiet -- src/backend/base/langflow/initial_setup/starter_projects; then
            echo "Starter projects are already current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/backend/base/langflow/initial_setup/starter_projects
          git commit -m "chore: refresh starter projects"
          git push origin "HEAD:${HEAD_REF}"

  update-component-index:
    name: Update Component Index
    if: >-
      github.actor != 'github-actions[bot]'
      && !github.event.pull_request.head.repo.fork
      && (github.event.action != 'labeled' || github.event.label.name == 'fix-index')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Merge base branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git merge origin/${{ github.base_ref }} --no-edit || {
            CONFLICTED=$(git diff --name-only --diff-filter=U)

            if echo "$CONFLICTED" | grep -v component_index.json | grep -q .; then
              echo "::error::Merge conflicts in non-generated files require manual resolution"
              git merge --abort
              exit 1
            fi

            git checkout --theirs src/lfx/src/lfx/_assets/component_index.json
            git add src/lfx/src/lfx/_assets/component_index.json
            GIT_EDITOR=true git merge --continue
          }

      - name: Setup Environment
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: ${{ env.PYTHON_VERSION }}
          prune-cache: false

      - name: Install dependencies
        run: uv sync --dev --project .

      - name: Build component index
        env:
          LFX_DEV: "1"
        run: make build_component_index

      - name: Commit refreshed component index
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          if git diff --quiet -- src/lfx/src/lfx/_assets/component_index.json; then
            echo "Component index is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/lfx/src/lfx/_assets/component_index.json
          git commit -m "chore: refresh component index"
          git push origin "HEAD:${HEAD_REF}"
