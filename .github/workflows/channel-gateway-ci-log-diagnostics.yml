name: Channel Gateway Python 3.10 Enum Repair

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/channel-gateway-ci-log-diagnostics.yml"

permissions:
  contents: write

jobs:
  repair:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Replace Python 3.11-only StrEnum usage
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import re

          files = [
              Path("src/backend/base/langflow/services/database/models/channel/execution_model.py"),
              Path("src/backend/base/langflow/services/database/models/channel/file_model.py"),
              Path("src/backend/base/langflow/services/database/models/channel/model.py"),
              Path("src/backend/base/langflow/services/database/models/channel/outbound_delivery_model.py"),
              Path("src/backend/base/langflow/services/database/models/channel/webhook_job_model.py"),
          ]
          for path in files:
              text = path.read_text(encoding="utf-8")
              text = text.replace("from enum import StrEnum", "from enum import Enum")
              text, count = re.subn(
                  r"class ([A-Za-z_][A-Za-z0-9_]*)\(StrEnum\):",
                  r"class \1(str, Enum):",
                  text,
              )
              if count == 0:
                  raise SystemExit(f"No StrEnum class declarations replaced in {path}")
              path.write_text(text, encoding="utf-8")
              print(f"updated {path}: {count} enum class(es)")
          PY

          if git grep -n "StrEnum" -- \
            src/backend/base/langflow/channels \
            src/backend/base/langflow/services/database/models/channel; then
            echo "Python 3.11-only StrEnum references remain" >&2
            exit 1
          fi

      - name: Verify Python 3.10 syntax
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Compile channel models
        shell: bash
        run: |
          set -euo pipefail
          python -m compileall -q \
            src/backend/base/langflow/channels \
            src/backend/base/langflow/services/database/models/channel

      - name: Commit compatibility repairs
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        shell: bash
        run: |
          set -euo pipefail
          git rm .github/workflows/channel-gateway-ci-log-diagnostics.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/backend/base/langflow/services/database/models/channel
          git commit -m "fix(channels): support Python 3.10 enum models"
          git pull --rebase origin "${HEAD_REF}"
          git push origin "HEAD:${HEAD_REF}"
