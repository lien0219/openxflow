name: Channel Gateway CI Log Diagnostics

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/channel-gateway-ci-log-diagnostics.yml"

permissions:
  contents: read

jobs:
  collect:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 1

      - name: Scan channel enums
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "Python 3.11-only enum imports:"
            git grep -n "from enum import StrEnum" -- \
              src/backend/base/langflow/channels \
              src/backend/base/langflow/services/database/models/channel || true
            echo
            echo "StrEnum class references:"
            git grep -n "StrEnum" -- \
              src/backend/base/langflow/channels \
              src/backend/base/langflow/services/database/models/channel || true
          } | tee channel-enum-scan.log

      - name: Upload diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: channel-enum-compatibility-scan
          path: channel-enum-scan.log
          if-no-files-found: error
          retention-days: 3
