name: Channel Gateway Semantic Color Fix

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/channel-gateway-semantic-fix.yml"

permissions:
  contents: write

jobs:
  fix:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Replace hardcoded palette classes
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path(
              "src/frontend/src/pages/SettingsPage/pages/ChannelsPage/"
              "components/ConversationsTab.tsx"
          )
          text = path.read_text(encoding="utf-8")
          old = (
              'className="mt-1 inline-flex rounded-full bg-amber-100 px-2 py-0.5 '
              'text-[11px] text-amber-800 dark:bg-amber-950/40 dark:text-amber-300"'
          )
          new = (
              'className="mt-1 inline-flex rounded-full border border-border bg-muted '
              'px-2 py-0.5 text-[11px] text-muted-foreground"'
          )
          if old not in text:
              raise SystemExit("legacy marker palette classes not found")
          path.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: src/frontend
        run: npm ci --ignore-scripts --loglevel=error

      - name: Validate updated component
        working-directory: src/frontend
        run: >-
          npx --no-install biome check --write --unsafe
          src/pages/SettingsPage/pages/ChannelsPage/components/ConversationsTab.tsx

      - name: Remove one-time workflow and commit
        shell: bash
        run: |
          set -euo pipefail
          git rm .github/workflows/channel-gateway-semantic-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/frontend/src/pages/SettingsPage/pages/ChannelsPage/components/ConversationsTab.tsx
          git commit -m "fix(channels): use semantic tokens for legacy marker"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
