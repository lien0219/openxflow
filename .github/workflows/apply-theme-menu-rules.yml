name: Apply final theme menu rules

on:
  push:
    branches:
      - agent/nebula-theme-preset

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: agent/nebula-theme-preset
      - name: Apply changes
        run: python scripts/apply_theme_menu_rules.py
      - name: Commit and clean temporary files
        run: |
          rm -f scripts/apply_theme_menu_rules.py
          rm -f .github/workflows/apply-theme-menu-rules.yml
          rm -f .github/workflows/fix-invalid-folder-redirect.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(theme): restrict appearance switching and localize labels"
          git push origin HEAD:agent/nebula-theme-preset