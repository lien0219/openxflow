name: Fix theme newline

on:
  push:
    branches:
      - agent/nebula-theme-preset

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: agent/nebula-theme-preset
      - name: Ensure final newline
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/frontend/src/style/themes.css')
          content = path.read_bytes()
          if not content.endswith(b'\n'):
              path.write_bytes(content + b'\n')
          PY
      - name: Commit fix
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/frontend/src/style/themes.css
          git commit -m "style(theme): add final newline"
          git push origin HEAD:agent/nebula-theme-preset
