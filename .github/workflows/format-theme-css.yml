name: Format theme CSS

on:
  push:
    branches:
      - agent/nebula-theme-preset

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: agent/nebula-theme-preset
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json
      - name: Install dependencies
        working-directory: src/frontend
        run: npm ci
      - name: Format theme CSS
        working-directory: src/frontend
        run: npx @biomejs/biome format --write src/style/themes.css
      - name: Commit formatting
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/frontend/src/style/themes.css
          git commit -m "style(theme): format standalone theme stylesheet"
          git push origin HEAD:agent/nebula-theme-preset
