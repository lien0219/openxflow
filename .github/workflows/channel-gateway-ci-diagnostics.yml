name: Channel Gateway CI Diagnostics

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/channel-gateway-ci-diagnostics.yml"

permissions:
  actions: read
  contents: read

concurrency:
  group: channel-gateway-ci-diagnostics-${{ github.ref }}
  cancel-in-progress: true

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Collect failing job logs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/channel-ci-diagnostics
          jobs=(
            89466769419
            89466768856
            89466768734
            89466769072
            89466768991
          )
          for job_id in "${jobs[@]}"; do
            gh api \
              -H "Accept: application/vnd.github+json" \
              "/repos/${GITHUB_REPOSITORY}/actions/jobs/${job_id}/logs" \
              > "/tmp/channel-ci-diagnostics/${job_id}.log"
          done

      - name: Build concise failure summary
        if: always()
        shell: bash
        run: |
          set -u
          summary=/tmp/channel-ci-diagnostics/summary.txt
          : > "$summary"
          for log in /tmp/channel-ci-diagnostics/*.log; do
            echo "===== $(basename "$log") =====" >> "$summary"
            grep -E -i -B 3 -A 8 \
              '(^|[^a-z])(error|failed|failure|traceback|would reformat|would format|not formatted|mismatch|missing|unexpected)([^a-z]|$)' \
              "$log" | tail -n 240 >> "$summary" || true
            echo >> "$summary"
          done
          cat "$summary"

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: channel-gateway-ci-diagnostics
          path: /tmp/channel-ci-diagnostics
          if-no-files-found: error
          retention-days: 3
