name: Channel Gateway Frontend

# Keep this workflow scoped to Channel Center changes so PR validation stays fast.
on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/channel-gateway-frontend.yml"
      - "src/frontend/package.json"
      - "src/frontend/package-lock.json"
      - "src/frontend/tsconfig.channels.json"
      - "src/frontend/src/controllers/API/queries/channels/**"
      - "src/frontend/src/controllers/API/helpers/constants.ts"
      - "src/frontend/src/pages/SettingsPage/pages/ChannelsPage/**"
      - "src/frontend/src/pages/SettingsPage/index.tsx"
      - "src/frontend/src/routes.tsx"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: channel-gateway-frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: src/frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --ignore-scripts --loglevel=error

      - name: Check Channel Center formatting and lint
        run: >-
          npx --no-install biome check
          src/controllers/API/queries/channels
          src/pages/SettingsPage/pages/ChannelsPage
          src/controllers/API/helpers/constants.ts
          src/pages/SettingsPage/index.tsx
          src/routes.tsx
          tsconfig.channels.json

  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: src/frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --ignore-scripts --loglevel=error

      - name: Run Channel Center unit tests
        run: >-
          npm test --
          --runInBand
          src/pages/SettingsPage/pages/ChannelsPage/__tests__/utils.test.ts

  type-check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: src/frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --ignore-scripts --loglevel=error

      - name: Type-check Channel Center
        shell: bash
        run: |
          set +e
          npx --no-install tsc --noEmit --pretty false --project tsconfig.channels.json 2>&1 | tee /tmp/channel-tsc.log
          tsc_status=${PIPESTATUS[0]}
          set -e

          channel_pattern='src/(controllers/API/queries/channels|pages/SettingsPage/pages/ChannelsPage|pages/SettingsPage/index\.tsx|routes\.tsx)'
          if grep -E "$channel_pattern" /tmp/channel-tsc.log; then
            echo "Channel Center type errors detected."
            exit 1
          fi

          if [ "$tsc_status" -ne 0 ]; then
            echo "::warning::TypeScript reported pre-existing errors outside the Channel Center scope."
          fi
